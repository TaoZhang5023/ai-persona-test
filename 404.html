<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF6EE" />
  <title>404 · AI 使用人设测试</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23FAF6EE'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='JetBrains Mono, monospace' font-weight='800' font-size='26' fill='%23FF5A1F'>AI</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #FAF6EE; --ink: #161513; --muted: #7A7366;
      --primary: #FF5A1F; --line: #1A1918;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: var(--bg);
      font-family: "Noto Sans SC", "PingFang SC", -apple-system, system-ui, sans-serif;
      color: var(--ink);
      text-align: center;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(107,90,237,.08), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,90,31,.08), transparent 50%);
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 18px;
      box-shadow: 4px 4px 0 0 var(--line);
      padding: 32px 24px;
    }
    .code {
      font-family: "JetBrains Mono", monospace;
      font-size: 88px;
      font-weight: 800;
      letter-spacing: .04em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .code .a { color: var(--primary); }
    .code .b { color: var(--ink); }
    .label {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    h1 { font-size: 24px; font-weight: 900; margin: 16px 0 8px; }
    p { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
    .btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--line);
      padding: 14px 24px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      box-shadow: 4px 4px 0 0 var(--line);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 0 var(--line); }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">error · not found</div>
    <div class="code"><span class="a">4</span><span class="b">0</span><span class="a">4</span></div>
    <h1>这个人设不在 16 + 4 之内</h1>
    <p>你访问的页面超越了我们的体系。</p>
    <a class="btn" href="./">回到首页 →</a>
  </div>
</body>
</html>
